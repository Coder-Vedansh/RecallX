<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecallX - Sequence Pro</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Dynamic Background Elements -->
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>

    <!-- MAIN APP WRAPPER -->
    <div id="app-root" class="fade-in">
        
        <!-- AUTHENTICATION CONTAINER -->
        <div id="auth-container" class="glass-panel">
            <h1 class="gradient-text">RecallX PRO</h1>
            <p id="auth-subtitle">Sequence Memory Game</p>
            
            <div id="login-view" class="auth-box">
                <div class="input-group">
                    <label>Player Name</label>
                    <input type="text" id="player-name" placeholder="Enter your Name" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="player-phone" placeholder="Enter mobile number">
                </div>
                <button id="btn-send-otp" class="primary-btn glow-on-hover">Send OTP</button>
            </div>

            <div id="otp-view" class="auth-box hidden">
                <p id="otp-desc" style="color:var(--text-main); font-weight:600; font-size:0.9rem; margin-bottom:15px;"></p>
                <div class="input-group">
                    <label>Secure OTP</label>
                    <input type="text" id="player-otp" placeholder="4-digit Verification Code">
                </div>
                <div class="btn-group">
                    <button id="btn-verify-otp" class="primary-btn glow-on-hover">Verify</button>
                    <button id="btn-back-login" class="danger-btn">Back</button>
                </div>
            </div>
        </div>

        <!-- GAME BOARD CONTAINER -->
        <div id="game-container" class="game-panel hidden">
            <header class="game-header">
                <div>
                    <h2 id="greeting-text">Loading...</h2>
                    <p class="score-tracking">Failures this run: <span id="failure-count">0</span></p>
                </div>
                <h1 id="level-text" class="gradient-text">LEVEL 1</h1>
                <div class="btn-group">
                    <button id="btn-view-leaderboard" class="secondary-btn">Leaderboard</button>
                    <button id="btn-logout" class="danger-btn">Logout</button>
                </div>
            </header>

            <div class="game-status">
                <h3 id="board-status">Initializing System...</h3>
                <div class="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="grid-board">
                <!-- Tiles injected via JS -->
            </div>
        </div>

        <!-- LEADERBOARD CONTAINER -->
        <div id="leaderboard-container" class="glass-panel wide-panel hidden">
            <h1 class="gradient-text">Global Leaderboard</h1>
            <p>Top RecallX Players based on zero-fault memory sequencing.</p>
            
            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player (Phone)</th>
                            <th>Levels Beaten</th>
                            <th>Failures (Attempts)</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="btn-group">
                <button id="btn-lb-play" class="primary-btn glow-on-hover">Play Again</button>
                <button id="btn-lb-logout" class="danger-btn">Sign Out</button>
            </div>
        </div>

    </div>

    <!-- Simulated SMS Modal -->
    <div id="sms-modal" class="modal hidden">
        <div class="modal-content">
            <div class="sms-header">📱 New Message</div>
            <p id="sms-text"></p>
            <button id="btn-close-sms" class="primary-btn">Close</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
