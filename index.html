<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecallX - Sequence Pro</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Dynamic Background Elements -->
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>

    <!-- MAIN APP WRAPPER -->
    <div id="app-root" class="fade-in">
        
        <!-- AUTHENTICATION CONTAINER -->
        <div id="auth-container" class="glass-panel">
            <h1 class="gradient-text">RecallX PRO</h1>
            <p id="auth-subtitle">Welcome back! Please login.</p>
            
            <div id="login-view" class="auth-box">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter username..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button id="btn-login" class="primary-btn glow-on-hover">Login to Account</button>
                <div class="auth-footer">
                    <p>Don't have an account? <span id="link-register" class="text-link">Sign Up</span></p>
                </div>
            </div>

            <div id="register-view" class="auth-box hidden">
                <div class="input-group">
                    <label>Choose a Username</label>
                    <input type="text" id="reg-username" placeholder="Unique username..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Create a Password</label>
                    <input type="password" id="reg-password" placeholder="Strong password">
                </div>
                <button id="btn-register" class="primary-btn glow-on-hover">Create Profile</button>
                <div class="auth-footer">
                    <p>Already registered? <span id="link-login" class="text-link">Login</span></p>
                </div>
            </div>
        </div>

        <!-- GAME BOARD CONTAINER -->
        <div id="game-container" class="game-panel hidden">
            <header class="game-header">
                <div>
                    <h2 id="greeting-text">Loading...</h2>
                    <p class="score-tracking">Failures this run: <span id="failure-count">0</span></p>
                </div>
                <h1 id="level-text" class="gradient-text">LEVEL 1</h1>
                <div class="btn-group">
                    <button id="btn-view-leaderboard" class="secondary-btn">Leaderboard</button>
                    <button id="btn-logout" class="danger-btn">Logout</button>
                </div>
            </header>

            <div class="game-status">
                <h3 id="board-status">Initializing System...</h3>
                <div class="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="grid-board">
                <!-- Tiles injected via JS -->
            </div>
        </div>

        <!-- LEADERBOARD CONTAINER -->
        <div id="leaderboard-container" class="glass-panel wide-panel hidden">
            <h1 class="gradient-text">Global Leaderboard</h1>
            <p>Top RecallX Players based on zero-fault memory sequencing.</p>
            
            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Levels Beaten</th>
                            <th>Failures (Attempts)</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="btn-group">
                <button id="btn-lb-play" class="primary-btn glow-on-hover">Play Again</button>
                <button id="btn-lb-logout" class="danger-btn">Sign Out</button>
            </div>
        </div>

    </div>

    <script src="./script.js"></script>
</body>
</html>
