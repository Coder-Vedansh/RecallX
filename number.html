<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecallX - Number Memory</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--primary);
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .back-nav:hover {
            background: var(--primary);
            color: #fff;
        }
        
        .number-display {
            font-size: 5rem;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: 5px;
            margin: 40px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .number-input-box {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            background: rgba(15, 23, 42, 0.5);
            color: #fff;
            width: 80%;
            margin-bottom: 20px;
        }
        .number-input-box:focus {
            outline: none;
            box-shadow: 0 0 15px var(--primary);
        }
    </style>
</head>
<body>

    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>

    <div id="app-root" class="fade-in">
        <a href="index.html" class="back-nav">← Return to Hub</a>
        
        <!-- GAME BOARD CONTAINER -->
        <div id="game-container" class="game-panel hidden" style="text-align: center; max-width: 600px;">
            <header class="game-header">
                <div>
                    <h2 id="greeting-text">Loading...</h2>
                    <p class="score-tracking">Score (Digits stored): <span id="failure-count">0</span></p>
                </div>
                <h1 id="level-text" class="gradient-text">LEVEL 1</h1>
                <div class="btn-group">
                    <button id="btn-view-leaderboard" class="secondary-btn">Leaderboard</button>
                </div>
            </header>

            <div class="game-status">
                <h3 id="board-status">Initializing Neurological Test...</h3>
                <div class="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <!-- Number Flash Area -->
            <div id="number-flash-area">
                <div class="number-display" id="large-number">START</div>
            </div>

            <!-- User Input Area -->
            <div id="number-input-area" class="hidden">
                <p style="color:#94a3b8; margin-bottom: 15px;">What was the number?</p>
                <input type="number" id="user-number-input" class="number-input-box" autocomplete="off" placeholder="?">
                <br>
                <button id="btn-submit-number" class="primary-btn glow-on-hover" style="font-size: 1.2rem; padding: 12px 40px;">Submit</button>
            </div>
            
            <!-- Result Area -->
            <div id="result-area" class="hidden" style="margin-top: 30px;">
                <p style="font-size: 1.2rem; color: #94a3b8;">Actual Number:</p>
                <h2 id="result-actual" style="color: #10b981; font-size: 2.5rem; margin-bottom:10px;">123</h2>
                <p style="font-size: 1.2rem; color: #94a3b8;">Your Answer:</p>
                <h2 id="result-user" style="color: #ef4444; font-size: 2.5rem; text-decoration: line-through;">124</h2>
                <button id="btn-next-level" class="primary-btn" style="margin-top: 20px;">Next Level</button>
            </div>

        </div>

        <!-- LEADERBOARD CONTAINER -->
        <div id="leaderboard-container" class="glass-panel wide-panel hidden">
            <h1 class="gradient-text">Number Memory Leaderboard</h1>
            <p>Top agents ranked by maximum consecutive digits remembered.</p>
            
            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player (Email)</th>
                            <th>Digits Beat</th>
                            <th>Errors</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="btn-group">
                <button id="btn-lb-play" class="primary-btn glow-on-hover">Play Again</button>
            </div>
        </div>

    </div>

    <script src="./number.js"></script>
</body>
</html>
