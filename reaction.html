<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecallX - Reaction Speed</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--primary);
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .back-nav:hover {
            background: var(--primary);
            color: #fff;
        }
        
        #reaction-pad {
            width: 100%;
            height: 300px;
            border-radius: 12px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .pad-idle { background: #334155; }
        .pad-wait { background: #ef4444; }
        .pad-go { background: #10b981; }

        #reaction-pad-text {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>

    <div id="app-root" class="fade-in">
        <a href="index.html" class="back-nav">← Return to Hub</a>
        
        <!-- GAME BOARD CONTAINER -->
        <div id="game-container" class="game-panel hidden" style="text-align: center; max-width: 700px;">
            <header class="game-header">
                <div>
                    <h2 id="greeting-text">Loading...</h2>
                    <p class="score-tracking">Last Time: <span id="failure-count">0</span> ms</p>
                </div>
                <h1 id="level-text" class="gradient-text">REFLEX TEST</h1>
                <div class="btn-group">
                    <button id="btn-view-leaderboard" class="secondary-btn">Leaderboard</button>
                </div>
            </header>

            <div class="game-status">
                <h3 id="board-status" style="color:#94a3b8;">When the red box turns green, click as fast as you can.</h3>
            </div>

            <!-- Reaction Area -->
            <div id="reaction-pad" class="pad-idle">
                <div id="reaction-pad-text">Click anywhere to start</div>
            </div>

            <!-- Result Area -->
            <div id="result-area" class="hidden" style="margin-top: 30px;">
                <p style="font-size: 1.2rem; color: #94a3b8;">Your Reaction Time:</p>
                <h2 id="result-ms" style="color: #10b981; font-size: 3rem; margin-bottom:20px;">250 ms</h2>
                <button id="btn-submit-score" class="primary-btn glow-on-hover" style="font-size: 1.1rem; padding: 10px 30px;">Save Score to Global</button>
            </div>

        </div>

        <!-- LEADERBOARD CONTAINER -->
        <div id="leaderboard-container" class="glass-panel wide-panel hidden">
            <h1 class="gradient-text">Reaction Speed Leaderboard</h1>
            <p>Top agents ranked by pure neurological speed (Lowest MS wins).</p>
            
            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player (Email)</th>
                            <th>Response Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="btn-group">
                <button id="btn-lb-play" class="primary-btn glow-on-hover">Test Again</button>
            </div>
        </div>

    </div>

    <script src="./reaction.js"></script>
</body>
</html>
