<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecallX - Sequence Pro</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--primary);
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .back-nav:hover {
            background: var(--primary);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>

    <div id="app-root" class="fade-in">
        <a href="index.html" class="back-nav">← Return to Hub</a>
        
        <!-- GAME BOARD CONTAINER -->
        <div id="game-container" class="game-panel hidden">
            <header class="game-header">
                <div>
                    <h2 id="greeting-text">Loading...</h2>
                    <p class="score-tracking">Failures this run: <span id="failure-count">0</span></p>
                </div>
                <h1 id="level-text" class="gradient-text">LEVEL 1</h1>
                <div class="btn-group">
                    <button id="btn-view-leaderboard" class="secondary-btn">Leaderboard</button>
                </div>
            </header>

            <div class="game-status">
                <h3 id="board-status">Initializing System...</h3>
                <div class="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="grid-board">
                <!-- Tiles injected via JS -->
            </div>
        </div>

        <!-- LEADERBOARD CONTAINER -->
        <div id="leaderboard-container" class="glass-panel wide-panel hidden">
            <h1 class="gradient-text">Sequence Pro Leaderboard</h1>
            <p>Top agents ranked by few sequence tracing defaults.</p>
            
            <div class="table-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player (Email)</th>
                            <th>Levels Beaten</th>
                            <th>Failures (Attempts)</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="btn-group">
                <button id="btn-lb-play" class="primary-btn glow-on-hover">Play Again</button>
            </div>
        </div>

    </div>

    <script src="./sequence.js"></script>
</body>
</html>
